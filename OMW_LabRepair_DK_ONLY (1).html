<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMW LabRepair TEST</title>
<style>
:root{
  --bg:#f4f7fb;--card:#fff;--ink:#172033;--muted:#6b7280;--blue:#2563eb;--red:#dc2626;--green:#16a34a;--line:#e5e7eb;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font:inherit}
button{border:0;border-radius:12px;padding:10px 16px;cursor:pointer;background:#fff;border:1px solid var(--line)}
button.primary{background:var(--blue);color:white;border-color:var(--blue)}
button.green{background:var(--green);color:white;border-color:var(--green)}
button.red{background:var(--red);color:white;border-color:var(--red)}
button:hover{filter:brightness(.97)}
.wrap{max-width:1250px;margin:0 auto;padding:22px}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:white;border:1px solid var(--line);border-radius:28px;padding:34px;max-width:620px;width:100%;box-shadow:0 20px 60px rgba(15,23,42,.08)}
.logo{font-size:34px;font-weight:800;margin-bottom:8px}
.muted{color:var(--muted)}
.lab-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:24px}
.lab-grid button{padding:18px;font-weight:700}
.top{background:#0f172a;color:white;position:sticky;top:0;z-index:10}
.top-inner{max-width:1250px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 22px}
.brand{font-weight:800;font-size:19px}
.role{opacity:.7;font-size:13px;margin-left:10px}
.nav{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}
.nav button.active{background:#0f172a;color:white}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 26px rgba(15,23,42,.04)}
.big{font-size:34px;font-weight:850}
.form-table,.data-table{width:100%;border-collapse:separate;border-spacing:0;background:white;border:1px solid var(--line);border-radius:20px;overflow:hidden}
th{background:#f8fafc;color:#64748b;text-transform:uppercase;letter-spacing:.05em;font-size:11px;text-align:left;padding:10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:8px;border-bottom:1px solid #f1f5f9;vertical-align:top}
tr:last-child td{border-bottom:0}
input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:9px;background:white}
textarea{min-height:38px;resize:vertical}
.actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700;background:#eff6ff;color:#1d4ed8}
.badge.red{background:#fee2e2;color:#991b1b}
.hidden{display:none!important}
.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
.search{max-width:360px}
.toast{position:fixed;right:18px;bottom:18px;background:#0f172a;color:white;padding:12px 16px;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.2);z-index:20}
@media(max-width:850px){.cards{grid-template-columns:repeat(2,1fr)}.lab-grid{grid-template-columns:1fr}.wrap{padding:14px}.top-inner{padding:12px 14px}.form-table{min-width:1050px}.table-scroll{overflow:auto}}
@media print{
  body *{visibility:hidden!important}
  #printArea,#printArea *{visibility:visible!important}
  #printArea{position:absolute;left:0;top:0;width:100%;padding:0!important}
  @page{size:A4 landscape;margin:8mm}
  .print-title{font-size:16px;font-weight:800;margin-bottom:6px}
  .print-meta{font-size:11px;margin-bottom:8px;color:#333}
  table.print-table{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed}
  table.print-table th,table.print-table td{border:1px solid #999;padding:4px;word-break:break-word;vertical-align:top}
  table.print-table th{background:#eee;color:#000;text-transform:none;letter-spacing:0;font-size:10px}
  .no-print{display:none!important}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="printArea" class="hidden"></div>
<script>
const LABS=["Lab A","Lab C","Lab D","Lab LC"];
const ANALYSES=["Total Kulbrinter","BTEX","Alifater","Hydro","Florosil","TK + BTEX","TK + BTEX + Florosil","TK + Florosil","Hydro + Alifater","Hydro + Florosil","PAH","PAH 17","PCB i jord","PFAS i jord","ICP","HG","Slam","ICP + HG","ICP + HG + SLAM","Glødetab","Chrom","Cyanid","Phenoler","Polære","Reaktionstal","TOC"];
const REASONS=["High resultat","Low resultat","Høj Terbium","Afvigelse QC","Mistanke om pipettering","Mistanke om homogenisering","Instrument check","Matrix/interferens","Efterbestilling","Ukendt"];
const KEY="omw_labrepair_working_v1";
const today=()=>new Date().toISOString().slice(0,10);
const now=()=>new Date().toLocaleString("da-DK",{hour12:false});
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
let state=load();

function load(){
  try{
    const saved=JSON.parse(localStorage.getItem(KEY)||"null");
    if(saved) return saved;
  }catch(e){}
  return {
    role:null, lab:null, tab:"send",
    repairs:[
      {id:uid(),lab:"Lab A",sample:"12345",box:"A-12",analysis:"Total Kulbrinter",bestems:"2+3",reason:"High resultat",comment:"Demo: haster",firstDate:today(),urgent:true,status:"new",createdAt:now(),printedAt:""},
      {id:uid(),lab:"Lab C",sample:"67890",box:"C-04",analysis:"BTEX",bestems:"4",reason:"Høj Terbium",comment:"Demo kommentar",firstDate:today(),urgent:false,status:"new",createdAt:now(),printedAt:""}
    ],
    archive:[]
  };
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function setRole(role,lab){state.role=role;state.lab=lab||role;state.tab=role==="Afvejning"?"afv":"send";save();render();}
function logout(){state.role=null;state.lab=null;save();render();}
function toast(msg){let t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
function parseBestems(v){return String(v||"").split("+").map(x=>x.trim()).filter(Boolean);}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}

function loginView(){
  return `<div class="login"><div class="login-card">
    <div class="logo">OMW LabRepair</div>
    <div class="muted">Testversion · vælg afdeling</div>
    <div class="lab-grid">
      ${LABS.map(l=>`<button onclick="setRole('Lab','${l}')">🧪 ${l}</button>`).join("")}
      <button onclick="setRole('Afvejning','Afvejning')" class="primary">⚖️ Afvejning</button>
      <button onclick="setRole('Admin','Admin')">👑 Admin</button>
    </div>
  </div></div>`;
}
function shell(body){
  return `<div class="top"><div class="top-inner">
    <div><span class="brand">OMW LabRepair</span><span class="role">${state.lab}</span></div>
    <button onclick="logout()">Skift afdeling</button>
  </div></div><div class="wrap">${nav()}${body}</div>`;
}
function nav(){
  const tabs = state.role==="Lab" ? [["send","Send reparationer"],["archive","Arkiv"],["dashboard","Dashboard"]]
    : [["afv","Afvejning"],["archive","Arkiv"],["dashboard","Dashboard"],["send","Test send"]];
  return `<div class="nav">${tabs.map(([k,l])=>`<button class="${state.tab===k?'active':''}" onclick="state.tab='${k}';save();render()">${l}</button>`).join("")}</div>`;
}
function datalist(id,arr){return `<datalist id="${id}">${arr.map(x=>`<option value="${escapeHtml(x)}"></option>`).join("")}</datalist>`}

function sendView(){
  let rows="";
  for(let i=0;i<20;i++){
    rows+=`<tr>
      <td>${i+1}</td>
      <td><input data-field="sample" data-row="${i}" onkeydown="navKey(event)" placeholder="Prøvenr."></td>
      <td><input data-field="box" data-row="${i}" onkeydown="navKey(event)" placeholder="Kasse"></td>
      <td><input data-field="analysis" data-row="${i}" onkeydown="navKey(event)" list="analysisList" placeholder="Skriv / vælg"></td>
      <td><input data-field="bestems" data-row="${i}" onkeydown="navKey(event)" placeholder="2+3"></td>
      <td><input data-field="reason" data-row="${i}" onkeydown="navKey(event)" list="reasonList" placeholder="Skriv / vælg"></td>
      <td><textarea data-field="comment" data-row="${i}" onkeydown="navKey(event)" placeholder="Valgfri"></textarea></td>
      <td><input type="date" data-field="firstDate" data-row="${i}" onkeydown="navKey(event)" value="${today()}"></td>
      <td style="text-align:center"><input type="checkbox" data-field="urgent" data-row="${i}" onkeydown="navKey(event)" style="width:20px;height:20px"></td>
    </tr>`;
  }
  return `<div class="card">
    <div class="toolbar"><div><h2 style="margin:0">Send reparationer</h2><div class="muted">Afsender: <b>${state.lab}</b></div></div></div>
    ${datalist("analysisList",ANALYSES)}${datalist("reasonList",REASONS)}
    <div class="table-scroll"><table class="form-table">
      <thead><tr><th>#</th><th>Prøve</th><th>Kasse</th><th>Analyse</th><th>Bestems</th><th>Årsag</th><th>Kommentar</th><th>1. vagt dato</th><th>Haster</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="actions"><span class="muted">Enter går til næste felt. Analyse og årsag har forslag, men udfyldes ikke automatisk.</span><button class="primary" onclick="sendRepairs()">Send udfyldte</button></div>
  </div>`;
}
function navKey(e){
  if(e.key!=="Enter")return;
  e.preventDefault();
  const els=[...document.querySelectorAll("[data-field]")].filter(el=>el.offsetParent!==null);
  const idx=els.indexOf(e.target);
  if(idx>=0 && idx<els.length-1) els[idx+1].focus();
}
function sendRepairs(){
  const rows={};
  document.querySelectorAll("[data-row]").forEach(el=>{
    const r=el.dataset.row, f=el.dataset.field;
    rows[r]=rows[r]||{};
    rows[r][f]= el.type==="checkbox" ? el.checked : el.value.trim();
  });
  const items=[];
  Object.values(rows).forEach(r=>{
    const empty=!r.sample&&!r.box&&!r.analysis&&!r.bestems&&!r.reason&&!r.comment;
    if(empty)return;
    if(!r.sample||!r.box||!r.analysis||!r.bestems||!r.reason||!r.firstDate) return;
    items.push({id:uid(),lab:state.lab,sample:r.sample,box:r.box,analysis:r.analysis,bestems:r.bestems,reason:r.reason,comment:r.comment||"",firstDate:r.firstDate,urgent:!!r.urgent,status:"new",createdAt:now(),printedAt:""});
  });
  if(!items.length){toast("Ingen komplette rækker. Kontrollér de obligatoriske felter.");return;}
  state.repairs=[...items,...state.repairs];save();toast(items.length+" reparationer sendt");render();
}

function afvView(){
  const newItems=state.repairs.filter(x=>x.status==="new");
  return `<div class="cards">
    <div class="card"><div class="big">${newItems.length}</div><div class="muted">Nye reparationer</div></div>
    <div class="card"><div class="big">${newItems.filter(x=>x.urgent).length}</div><div class="muted">Haster</div></div>
    <div class="card"><div class="big">${state.archive.length}</div><div class="muted">Arkiv i alt</div></div>
    <div class="card"><div class="big">${new Set(newItems.map(x=>x.lab)).size}</div><div class="muted">Laboratorier med nye</div></div>
  </div>
  <div class="card">
    <div class="toolbar">
      <div><h2 style="margin:0">Afvejning</h2><div class="muted">Test: Print A4 otvara browser print dijalog. Zebra je samo forhåndsvisning.</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="primary" onclick="printA4()">Print A4-liste</button>
        <button onclick="printZebraPreview()">Print Zebra-etiketter</button>
        <button class="green" onclick="archiveNew()">Arkivér nye</button>
      </div>
    </div>
    ${tableView(newItems,false)}
  </div>`;
}
function tableView(items,archive){
  if(!items.length)return `<div class="muted" style="padding:28px;text-align:center">Ingen data</div>`;
  return `<div class="table-scroll"><table class="data-table">
    <thead><tr><th>Lab</th><th>Prøve</th><th>Kasse</th><th>Analyse</th><th>Bestems</th><th>Etiketter</th><th>Årsag</th><th>Kommentar</th><th>1. vagt</th><th>Haster</th><th>Sendt</th>${archive?'<th>Printet</th>':''}</tr></thead>
    <tbody>${items.map(r=>`<tr>
      <td><span class="badge">${escapeHtml(r.lab)}</span></td>
      <td><b>${escapeHtml(r.sample)}</b></td>
      <td>${escapeHtml(r.box)}</td>
      <td>${escapeHtml(r.analysis)}</td>
      <td>${escapeHtml(r.bestems)}</td>
      <td>${parseBestems(r.bestems).map(b=>escapeHtml(r.sample+"-"+b)).join("<br>")}</td>
      <td>${escapeHtml(r.reason)}</td>
      <td>${escapeHtml(r.comment)}</td>
      <td>${escapeHtml(r.firstDate)}</td>
      <td>${r.urgent?'<span class="badge red">Haster</span>':''}</td>
      <td>${escapeHtml(r.createdAt)}</td>
      ${archive?`<td>${escapeHtml(r.printedAt||"")}</td>`:''}
    </tr>`).join("")}</tbody></table></div>`;
}
function printA4(){
  const items=state.repairs.filter(x=>x.status==="new");
  if(!items.length){toast("Ingen nye reparationer");return;}
  const printHtml=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>A4 print</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;padding:10mm;color:#111}
    .print-title{font-size:18px;font-weight:800;margin-bottom:6px}
    .print-meta{font-size:12px;margin-bottom:10px;color:#333}
    table{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed}
    th,td{border:1px solid #999;padding:4px;word-break:break-word;vertical-align:top}
    th{background:#eee;font-size:10px;text-align:left}
    .topbar{display:flex;gap:10px;margin-bottom:12px}
    button{font-size:14px;padding:8px 14px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer}
    button.primary{background:#2563eb;color:white;border-color:#2563eb}
    @page{size:A4 landscape;margin:8mm}
    @media print{.topbar{display:none!important}body{padding:0}}
  </style></head><body>
  <div class="topbar"><button class="primary" onclick="window.print()">Print A4</button><button onclick="window.close()">Luk</button></div>
  <div class="print-title">OMW LabRepair — nye reparationer</div>
  <div class="print-meta">Udskrevet: ${now()} · Antal: ${items.length}</div>
  <table><thead><tr><th style="width:7%">Lab</th><th style="width:9%">Prøve</th><th style="width:7%">Kasse</th><th style="width:14%">Analyse</th><th style="width:7%">Bestems</th><th style="width:13%">Etiketter</th><th style="width:12%">Årsag</th><th style="width:18%">Kommentar</th><th style="width:8%">1. vagt</th><th style="width:5%">Haster</th></tr></thead>
  <tbody>${items.map(r=>`<tr><td>${escapeHtml(r.lab)}</td><td>${escapeHtml(r.sample)}</td><td>${escapeHtml(r.box)}</td><td>${escapeHtml(r.analysis)}</td><td>${escapeHtml(r.bestems)}</td><td>${parseBestems(r.bestems).map(b=>escapeHtml(r.sample+"-"+b)).join("<br>")}</td><td>${escapeHtml(r.reason)}</td><td>${escapeHtml(r.comment).slice(0,120)}</td><td>${escapeHtml(r.firstDate)}</td><td>${r.urgent?"JA":""}</td></tr>`).join("")}</tbody></table>
  </body></html>`;
  const w=window.open("", "_blank");
  if(!w){
    toast("Browseren blokerer printvinduet. Tillad pop op-vinduer for denne fil/side.");
    return;
  }
  w.document.open();
  w.document.write(printHtml);
  w.document.close();
  w.focus();
}

function printZebraPreview(){
  const items=state.repairs.filter(x=>x.status==="new");
  if(!items.length){toast("Ingen nye reparationer");return;}
  const labels=[];
  items.forEach(r=>parseBestems(r.bestems).forEach(b=>labels.push({code:r.sample+"-"+b,analysis:r.analysis})));
  const pa=document.getElementById("printArea");
  pa.className="";
  pa.innerHTML=`<style>@media print{@page{size:50mm 25mm;margin:0}.zlabel{page-break-after:always;width:50mm;height:25mm;padding:3mm;font-family:Arial}.zcode{font-size:14pt;font-weight:bold}.zana{font-size:9pt;margin-top:2mm}}</style>
  ${labels.map(l=>`<div class="zlabel"><div class="zcode">${escapeHtml(l.code)}</div><div class="zana">${escapeHtml(l.analysis)}</div><div style="font-size:8pt;margin-top:1mm">Reparation</div></div>`).join("")}`;
  setTimeout(()=>window.print(),100);
}
function archiveNew(){
  const items=state.repairs.filter(x=>x.status==="new");
  if(!items.length){toast("Ingen nye reparationer");return;}
  const printedAt=now();
  state.archive=[...items.map(x=>({...x,status:"archived",printedAt})),...state.archive];
  state.repairs=state.repairs.filter(x=>x.status!=="new");
  save();toast(items.length+" flyttet til arkiv");render();
}
function archiveView(){
  const q=(document.getElementById("searchBox")?.value||"").toLowerCase();
  const items=state.archive.filter(r=>JSON.stringify(r).toLowerCase().includes(q));
  return `<div class="card"><div class="toolbar"><div><h2 style="margin:0">Arkiv</h2><div class="muted">${state.archive.length} arkiverede reparationer</div></div><input class="search" id="searchBox" placeholder="Søg efter prøve, analyse, laboratorium eller årsag..." oninput="renderArchiveOnly()"></div><div id="archiveTable">${tableView(items,true)}</div></div>`;
}
function renderArchiveOnly(){
  const q=(document.getElementById("searchBox")?.value||"").toLowerCase();
  const items=state.archive.filter(r=>JSON.stringify(r).toLowerCase().includes(q));
  document.getElementById("archiveTable").innerHTML=tableView(items,true);
}
function dashboardView(){
  const all=[...state.repairs,...state.archive];
  const month=new Date().toISOString().slice(0,7);
  const m=all.filter(x=>(x.firstDate||"").startsWith(month));
  const byLab={}; const byAnalysis={}; const byReason={};
  m.forEach(x=>{byLab[x.lab]=(byLab[x.lab]||0)+1;byAnalysis[x.analysis]=(byAnalysis[x.analysis]||0)+1;byReason[x.reason]=(byReason[x.reason]||0)+1;});
  return `<div class="cards">
    <div class="card"><div class="big">${state.repairs.length}</div><div class="muted">Nye</div></div>
    <div class="card"><div class="big">${m.length}</div><div class="muted">Denne måned</div></div>
    <div class="card"><div class="big">${m.filter(x=>x.urgent).length}</div><div class="muted">Haster måned</div></div>
    <div class="card"><div class="big">${state.archive.length}</div><div class="muted">Arkiv i alt</div></div>
  </div>
  <div class="cards" style="grid-template-columns:repeat(3,minmax(0,1fr))">
    <div class="card"><h3>Pr. laboratorium</h3>${bars(byLab)}</div>
    <div class="card"><h3>Pr. analyse</h3>${bars(byAnalysis)}</div>
    <div class="card"><h3>Pr. årsag</h3>${bars(byReason)}</div>
  </div>`;
}
function bars(obj){
  const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(!entries.length)return '<div class="muted">Ingen data</div>';
  const max=Math.max(...entries.map(e=>e[1]));
  return entries.map(([k,v])=>`<div style="margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:13px"><span>${escapeHtml(k)}</span><b>${v}</b></div><div style="height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden"><div style="height:100%;width:${Math.max(8,(v/max)*100)}%;background:#2563eb"></div></div></div>`).join("");
}
function render(){
  const app=document.getElementById("app");
  if(!state.role){app.innerHTML=loginView();return;}
  let body="";
  if(state.tab==="send") body=sendView();
  if(state.tab==="afv") body=afvView();
  if(state.tab==="archive") body=archiveView();
  if(state.tab==="dashboard") body=dashboardView();
  app.innerHTML=shell(body);
}
render();
</script>
</body>
</html>
